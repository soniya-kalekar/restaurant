<!DOCTYPE html>
<html>
<head>

<title>Customer Reviews</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
margin:0;
padding:20px;
background:#ececec;
font-family:Arial;
}

.box{
max-width:700px;
margin:auto;
background:white;
padding:30px;
border-radius:10px;
box-shadow:0 10px 25px rgba(0,0,0,0.25);
}

h1{
text-align:center;
margin-bottom:30px;
}

.review{
display:flex;
align-items:flex-start;
margin-bottom:25px;
border-bottom:1px solid #ddd;
padding-bottom:20px;
}

.profile{
width:50px;
height:50px;
border-radius:50%;
margin-right:15px;
}

.review-content{
flex:1;
}

.name{
font-weight:bold;
}

.stars{
color:#f5a623;
margin:3px 0;
}

.text{
font-size:16px;
color:#333;
}

button{
display:block;
margin:30px auto 0;
padding:12px 20px;
border:none;
border-radius:8px;
background:#ff4d4d;
color:white;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#e60000;
}

</style>

</head>

<body>

<div class="box">

<h1>Customer Reviews</h1>

<div class="review">

<img class="profile" src="https://i.pravatar.cc/50?img=1">

<div class="review-content">

<div class="name">Rahul Sharma</div>
<div class="stars">⭐️⭐️⭐️⭐️⭐️</div>
<div class="text">Amazing poies! The taste is incredible.</div>

</div>
</div>


<div class="review">

<img class="profile" src="https://i.pravatar.cc/50?img=5">

<div class="review-content">

<div class="name">Priya Patel</div>
<div class="stars">⭐️⭐️⭐️⭐️</div>
<div class="text">Great snacks and friendly service.</div>

</div>
</div>


<div class="review">

<img class="profile" src="https://i.pravatar.cc/50?img=8">

<div class="review-content">

<div class="name">Amit Verma</div>
<div class="stars">⭐️⭐️⭐️⭐️⭐️</div>
<div class="text">One of the best food spots in the area!</div>

</div>
</div>

<button onclick="goBack()">⬅ Back to Restaurant</button>

</div>

<script>

function goBack(){
window.location.href="index.html";
}

</script>

</body>
</html>
