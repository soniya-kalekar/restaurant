<!DOCTYPE html>
<html>
<head>
<title>Poie Bomb Menu</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
margin:0;
font-family:Arial;
background:#f5f5f5;
overflow:hidden;
}

/* slider */

.slider{
display:flex;
width:400%;
height:100vh;
transition:transform 0.6s ease;
}

/* page */

.page{
width:100vw;
flex-shrink:0;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
background:white;
text-align:center;
}

/* cover */

.cover{
background:#b30000;
color:white;
}

.stamp{
font-size:50px;
font-weight:bold;
border:6px solid white;
padding:20px 40px;
transform:rotate(-8deg);
letter-spacing:4px;
background:rgba(0,0,0,0.25);
}

.swipe{
margin-top:20px;
font-size:18px;
}

/* titles */

h2{
font-size:32px;
margin-bottom:20px;
}

/* menu grid */

.menu{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:15px;
padding:10px;
}

/* card */

.item{
width:40vw;
max-width:160px;
text-align:center;
}

.item img{
width:100%;
height:110px;
object-fit:cover;
border-radius:12px;
border:5px solid white;
box-shadow:0 6px 12px rgba(0,0,0,0.3);
}

.item p{
margin-top:8px;
font-weight:bold;
}

</style>
</head>

<body>

<div class="slider" id="slider">

<!-- COVER -->

<div class="page cover">

<div class="stamp">POIE BOMB</div>
<div class="swipe">Tap or Swipe →</div>

</div>

<!-- VEG -->

<div class="page">

<h2>Veg Menu</h2>

<div class="menu">

<div class="item">
<img src="f1.jpg">
<p>Veg Poie ₹50</p>
</div>

<div class="item">
<img src="f2.jpg">
<p>Paneer Poie ₹80</p>
</div>

<div class="item">
<img src="f3.jpg">
<p>Cheese Poie ₹70</p>
</div>

</div>

</div>

<!-- NON VEG -->

<div class="page">

<h2>Non-Veg Menu</h2>

<div class="menu">

<div class="item">
<img src="v1.jpg">
<p>Chicken Poie ₹90</p>
</div>

<div class="item">
<img src="v2.jpg">
<p>Egg Poie ₹60</p>
</div>

<div class="item">
<img src="v3.jpg">
<p>Chicken Cheese ₹110</p>
</div>

</div>

</div>

<!-- BEVERAGES -->

<div class="page">

<h2>Beverages</h2>

<div class="menu">

<div class="item">
<img src="f4.jpg">
<p>Cold Drink ₹30</p>
</div>

<div class="item">
<img src="b1.jpg">
<p>Lassi ₹40</p>
</div>

<div class="item">
<img src="b1.jpg">
<p>Buttermilk ₹25</p>
</div>

</div>

</div>

</div>

<script>

let current = 0
const slider = document.getElementById("slider")

document.addEventListener("click",()=>{

current++

if(current>3){
current=0
}

slider.style.transform="translateX(-"+current*100+"vw)"

})

</script>

</body>
</html>
