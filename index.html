<!DOCTYPE html>
<html>
<head>
<title>Restaurant Menu</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
margin:0;
padding:15px;
background:#ececec;
font-family:Arial;
}

.frame{
background:white;
border:10px solid #3b2a1a;
border-radius:12px;
box-shadow:0 10px 30px rgba(0,0,0,0.4);
overflow:hidden;
}

/* TOP SECTION */

.top{
text-align:center;
height:420px;
width:100%;
background-image: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)), url(r3.jfif);
background-size:cover;
background-position:center;
display:flex;
justify-content:center;
align-items:center;
}

/* HERO IMAGES */

.hero{
display:flex;
justify-content:center;
align-items:center;
gap:10px;
}

.hero img{
width:280px;
height:280px;
object-fit:cover;
border-radius:12px;
border:8px solid white;
box-shadow:0 10px 25px rgba(0,0,0,0.35);
}

/* LEFT IMAGE */

.left{
transform:rotate(-6deg);
margin-right:-50px;
z-index:1;
}

/* CENTER */

.center{
z-index:2;
}

/* RIGHT IMAGE */

.right{
transform:rotate(6deg);
margin-left:-50px;
z-index:1;
}

/* TITLE */

h1{
margin:25px 0;
font-size:30px;
}

/* BOTTOM SECTION */

.bottom{
text-align:center;
background:#f5f5f5;
padding:20px;
}

/* BUTTONS */

.buttons{
margin-bottom:15px;
}

button{
padding:12px 22px;
margin:6px;
font-size:16px;
border:none;
border-radius:8px;
background:#ff4d4d;
color:white;
cursor:pointer;
}

button:hover{
background:#e60000;
}

/* -------------------- */
/* PHONE OPTIMIZATION */
/* -------------------- */

@media (max-width:700px){

.top{
height:320px;
}

.hero img{
width:160px;
height:160px;
}

.left{
margin-right:-25px;
}

.right{
margin-left:-25px;
}

h1{
font-size:24px;
}

button{
font-size:14px;
padding:10px 18px;
}

}

.whatapp{
  position:fixed;
  bottom:20px;
  right:20px;
  width:60px;
  height:60px;
  border-radius:50%;
  cursor:pointer;
  
}

</style>

</head>

<body>

<div class="frame">

<div class="top">

<div class="hero">
<img src="p1.png" class="left">
<img src="resturent.png" class="center">
<img src="r2.png" class="right">
</div>

</div>

<center><h1>POIE BOMB</h1></center>

<div class="bottom">

<div class="buttons">
<button onclick="openMap()">📍 Location</button>
<button onclick="openMenu()">📖 Menu</button>
<button onclick="openReview()">⭐ Reviews</button>
<button onclick="contact()">contact</button>

</div>

<h4>
🍟 Crafting The Future of the Poies 🥙<br>
5PM to 9PM 🕘<br>
Monday & Thursday Close 🫥
</h4>

<a href="https://wa.me/919999999999">
<img src="whatapp.jfif" class="whatapp">
</a>


</div>

</div>

<script>

function openMap(){
window.open("https://maps.app.goo.gl/5Zd3AS5U1fqczJkY7");
}

function openMenu(){
window.location.href="menu.html";
}

function openReview(){
window.open("https://www.google.com/search?sca_esv=32ed2d6df950acda&rlz=1C1UEAD_enIN1051IN1051&sxsrf=ANbL-n7gXa2HQ9aO_gDGEzzNWWDeHTijjg:1776524438449&si=AL3DRZEsmMGCryMMFSHJ3StBhOdZ2-6yYkXd_doETEE1OR-qOTKJKkBqVLRxEw8uI01D5FyqKVH1wEbtEiaZqgt83Wt4OZ5Jn7Mwcettp-Zdk3QoMPQdtvsc5nauXaxu9oimO1A8IWVj&q=Poie+Bomb+Reviews&sa=X&ved=2ahUKEwjxsdqg1feTAxXlnq8BHT8sGyIQ0bkNegQIKRAF&biw=1517&bih=703&dpr=0.9");
}

</script>

</body>
</html>
