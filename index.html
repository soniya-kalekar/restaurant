<!DOCTYPE html>
<html>
<head>
<title>Restaurant Menu</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
margin:0;
padding:15px;
background:#ececec;
font-family:Arial;
}

.frame{
background:white;
border:10px solid #3b2a1a;
border-radius:12px;
box-shadow:0 10px 30px rgba(0,0,0,0.4);
overflow:hidden;
}

/* TOP SECTION */

.top{
text-align:center;
height:420px;
width:100%;
background-image: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)), url(r3.jfif);
background-size:cover;
background-position:center;
display:flex;
justify-content:center;
align-items:center;
}

/* HERO IMAGES */

.hero{
display:flex;
justify-content:center;
align-items:center;
gap:30px;
}

.hero img{
width:260px;
height:260px;
object-fit:cover;
border-radius:12px;
border:8px solid white;
box-shadow:0 10px 25px rgba(0,0,0,0.35);
}

.left{
transform:rotate(-6deg);
margin-right:-40px;
z-index:1;
}

.center{
z-index:2;
}

.right{
transform:rotate(6deg);
margin-left:-40px;
z-index:1;
}

h1{
margin:25px 0;
font-size:30px;
}

.bottom{
text-align:center;
background:#f5f5f5;
padding:20px;
}

.buttons{
margin-bottom:15px;
}

button{
padding:12px 22px;
margin:6px;
font-size:16px;
border:none;
border-radius:8px;
background:#ff4d4d;
color:white;
cursor:pointer;
}

button:hover{
background:#e60000;
}

.food{
padding:40px 20px;
text-align:center;
}

.food h2{
margin-bottom:30px;
}

.food-grid{
display:flex;
justify-content:center;
gap:25px;
flex-wrap:wrap;
}

.food-item{
width:220px;
}

.food-item img{
width:100%;
height:160px;
object-fit:cover;
border-radius:10px;
box-shadow:0 6px 15px rgba(0,0,0,0.25);
}

/* CONTACT SECTION */

.contact{
padding:30px;
text-align:center;
background:#fff7f0;
}

/* REVIEW SECTION */

.review{
padding:30px;
text-align:center;
background:#f9f9f9;
display:none;
}

.review p{
max-width:600px;
margin:auto;
margin-bottom:15px;
}

/* MAP */

.map{
width:100%;
height:250px;
border:none;
margin-top:15px;
}

@media (max-width:700px){

.top{
height:320px;
}

.hero img{
width:160px;
height:160px;
}

.left{
margin-right:-25px;
}

.right{
margin-left:-25px;
}

h1{
font-size:24px;
}

button{
font-size:14px;
padding:10px 18px;
}

.food-grid{
gap:15px;
}

}

.whatapp{
position:fixed;
bottom:20px;
right:20px;
width:60px;
height:60px;
border-radius:50%;
cursor:pointer;
}

</style>

</head>

<body>

<div class="frame">

<div class="top">

<div class="hero">
<img src="p1.png" class="left">
<img src="resturent.png" class="center">
<img src="r2.png" class="right">
</div>

</div>

<center><h1>POIE BOMB</h1></center>

<div class="bottom">

<div class="buttons">
<button onclick="openMap()">📍 Location</button>
<button onclick="openMenu()">📖 Menu</button>
<button onclick="openReview()">⭐ Reviews</button>
<button onclick="contact()">Contact</button>
</div>

<h4>
🍟 Crafting The Future of the Poies 🥙<br>
5PM to 9PM 🕘<br>
Monday & Thursday Close 🫥
</h4>

</div>

<!-- FOOD SECTION -->

<div class="food">

<h2>Our Specials</h2>

<div class="food-grid">

<div class="food-item">
<img src="v1.jpg">
<p>Chicken Poie</p>
</div>

<div class="food-item">
<img src="v2.jpg">
<p>Loaded Fries</p>
</div>

<div class="food-item">
<img src="v3.jpg">
<p>Special Sandwich</p>
</div>

</div>

</div>



<!-- CONTACT SECTION -->

<div class="contact" id="contact">

<h2>Contact</h2>

<p>
📍 Address: Tarabai school bhamai, Near sakhalim road, Usgaon, Bicholim, Goa 403105
</p>

<p>
📞 Phone: 090211 15439
</p>

<iframe
class="map"
src="https://www.google.com/maps?q=Tarabai%20School%20Bhamai%20Goa&output=embed">
</iframe>

</div>

<a href="https://wa.me/919021115439">
<img src="whatapp.jfif" class="whatapp">
</a>

</div>

<script>

function openMap(){
window.open("https://maps.app.goo.gl/5Zd3AS5U1fqczJkY7");
}

function openMenu(){
window.location.href="menu.html";
}

function openReview(){
window.location.href="review.html";
}

function contact(){
document.getElementById("contact").scrollIntoView({behavior:"smooth"});
}

</script>

</body>
</html>
